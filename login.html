<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskify — Entrar</title>
  <meta name="description" content="Entre na sua conta Taskify e retome de onde parou." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 overflow-x-hidden min-h-screen flex flex-col">

<!-- ═══════════════════════════════════════════════════════
     NAV
═══════════════════════════════════════════════════════ -->
<nav class="relative z-50 w-full px-6 py-5">
  <div class="max-w-6xl mx-auto flex items-center justify-between">

    <!-- Logo -->
    <a href="index.html"
       class="flex items-center gap-2 font-display font-bold text-xl tracking-tight text-gray-900 dark:text-white
              focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
      <span class="w-8 h-8 rounded-lg bg-lilac-500 flex items-center justify-center text-white text-sm shadow-lg btn-glow">✓</span>
      Taskify
    </a>

    <div class="flex items-center gap-3">
      <!-- Theme toggle -->
      <button id="theme-toggle" aria-label="Alternar tema"
        class="w-9 h-9 rounded-full flex items-center justify-center text-gray-500 dark:text-gray-400
               hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors
               focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-950">
        <svg id="icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>

      <a href="index.html"
         class="hidden md:inline-flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold
                text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-700
                hover:border-lilac-400 dark:hover:border-lilac-500 hover:text-lilac-600 dark:hover:text-lilac-400
                transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-950">
        Criar conta
      </a>
    </div>
  </div>
</nav>

<!-- ═══════════════════════════════════════════════════════
     MAIN — Login card
═══════════════════════════════════════════════════════ -->
<main class="relative flex-1 flex items-center justify-center px-6 py-12 overflow-hidden">

  <!-- Gradient orbs (decorative) -->
  <div aria-hidden="true" class="orb w-[600px] h-[600px] bg-lilac-500/20 dark:bg-lilac-600/15 top-[-200px] left-[-150px] animate-orb-drift"></div>
  <div aria-hidden="true" class="orb w-[400px] h-[400px] bg-lilac-400/15 dark:bg-lilac-500/10 bottom-[-120px] right-[-100px] animate-orb-drift" style="animation-delay:-6s;animation-direction:alternate-reverse"></div>
  <div aria-hidden="true" class="orb w-[250px] h-[250px] bg-gray-300/40 dark:bg-gray-700/30 top-[30%] right-[15%] animate-orb-drift" style="animation-delay:-10s"></div>

  <!-- Card -->
  <div class="relative z-10 w-full max-w-md animate-fade-up opacity-0 [animation-fill-mode:forwards]">

    <!-- Card header -->
    <div class="text-center mb-8">
      <p class="inline-flex items-center gap-2 px-3 py-1.5 mb-4 rounded-full text-xs font-semibold
                bg-lilac-100 dark:bg-lilac-900/40 text-lilac-700 dark:text-lilac-300
                border border-lilac-200 dark:border-lilac-700/50">
        <span class="w-1.5 h-1.5 rounded-full bg-lilac-500 animate-pulse"></span>
        Bem-vindo de volta
      </p>
      <h1 id="login-heading" class="font-display font-bold text-3xl text-gray-900 dark:text-white mb-2">
        Entre na sua conta
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        Não tem conta?
        <a href="index.html#pricing"
           class="font-semibold text-lilac-600 dark:text-lilac-400 hover:text-lilac-500 dark:hover:text-lilac-300 transition-colors
                  focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
          Comece grátis
        </a>
      </p>
    </div>

    <!-- Login form card -->
    <div class="bg-white dark:bg-gray-900/80 backdrop-blur-sm rounded-2xl border border-gray-200 dark:border-gray-700/60 shadow-xl p-8">

      <!-- Social login -->
      <div class="flex flex-col gap-3 mb-6">
        <button type="button"
          class="flex items-center justify-center gap-3 w-full px-4 py-2.5 rounded-lg text-sm font-semibold
                 text-gray-700 dark:text-gray-200 bg-gray-50 dark:bg-gray-800
                 border border-gray-200 dark:border-gray-700
                 hover:bg-gray-100 dark:hover:bg-gray-700/70 transition-colors
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">
          <!-- Google icon -->
          <svg aria-hidden="true" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continuar com Google
        </button>

        <button type="button"
          class="flex items-center justify-center gap-3 w-full px-4 py-2.5 rounded-lg text-sm font-semibold
                 text-gray-700 dark:text-gray-200 bg-gray-50 dark:bg-gray-800
                 border border-gray-200 dark:border-gray-700
                 hover:bg-gray-100 dark:hover:bg-gray-700/70 transition-colors
                 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">
          <!-- GitHub icon -->
          <svg aria-hidden="true" class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
          </svg>
          Continuar com GitHub
        </button>
      </div>

      <!-- Divider -->
      <div role="separator" aria-label="ou" class="relative flex items-center gap-3 mb-6">
        <div aria-hidden="true" class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
        <span aria-hidden="true" class="text-xs font-medium text-gray-400 dark:text-gray-500">ou</span>
        <div aria-hidden="true" class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
      </div>

      <!-- Email/password form -->
      <form novalidate aria-labelledby="login-heading">
        <div class="flex flex-col gap-5">

          <!-- Email -->
          <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">
              E-mail
            </label>
            <input
              id="email"
              name="email"
              type="email"
              autocomplete="email"
              required
              placeholder="voce@exemplo.com"
              class="w-full px-4 py-2.5 rounded-lg text-sm
                     bg-gray-50 dark:bg-gray-800
                     text-gray-900 dark:text-gray-100
                     placeholder:text-gray-400 dark:placeholder:text-gray-500
                     border border-gray-200 dark:border-gray-700
                     hover:border-lilac-400 dark:hover:border-lilac-500
                     focus:border-lilac-500 dark:focus:border-lilac-400 focus:bg-white dark:focus:bg-gray-800/80
                     transition-colors focus-visible:outline-none
                     focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-0"
            />
          </div>

          <!-- Password -->
          <div>
            <div class="flex items-center justify-between mb-1.5">
              <label for="password" class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
                Senha
              </label>
              <a href="#"
                 class="text-xs font-semibold text-lilac-600 dark:text-lilac-400 hover:text-lilac-500 dark:hover:text-lilac-300 transition-colors
                        focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
                Esqueceu a senha?
              </a>
            </div>
            <div class="relative">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                required
                placeholder="••••••••"
                class="w-full px-4 py-2.5 pr-11 rounded-lg text-sm
                       bg-gray-50 dark:bg-gray-800
                       text-gray-900 dark:text-gray-100
                       placeholder:text-gray-400 dark:placeholder:text-gray-500
                       border border-gray-200 dark:border-gray-700
                       hover:border-lilac-400 dark:hover:border-lilac-500
                       focus:border-lilac-500 dark:focus:border-lilac-400 focus:bg-white dark:focus:bg-gray-800/80
                       transition-colors focus-visible:outline-none
                       focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-0"
              />
              <button
                type="button"
                id="toggle-password"
                aria-label="Mostrar senha"
                aria-pressed="false"
                class="absolute inset-y-0 right-3 flex items-center text-gray-400 dark:text-gray-500
                       hover:text-gray-600 dark:hover:text-gray-300 transition-colors
                       focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
                <svg id="eye-icon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <svg id="eye-off-icon" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0 1 12 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 0 1 4.126-5.421M9.878 9.88a3 3 0 1 0 4.243 4.243M3 3l18 18"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Remember me -->
          <div class="flex items-center gap-2.5">
            <input
              id="remember"
              name="remember"
              type="checkbox"
              class="w-4 h-4 rounded border border-gray-300 dark:border-gray-600
                     bg-gray-50 dark:bg-gray-800
                     focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-1 dark:focus-visible:ring-offset-gray-900
                     cursor-pointer accent-lilac-500"
            />
            <label for="remember" class="text-sm text-gray-600 dark:text-gray-400 cursor-pointer select-none">
              Lembrar de mim
            </label>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            class="w-full flex items-center justify-center gap-2 px-5 py-3 rounded-lg text-sm font-semibold
                   text-white bg-lilac-600 hover:bg-lilac-500 btn-glow transition-colors
                   focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 focus-visible:ring-offset-2 dark:focus-visible:ring-offset-gray-900">
            <svg aria-hidden="true" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12H3m0 0 4-4m-4 4 4 4M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
            </svg>
            Entrar
          </button>

        </div>
      </form>

    </div>

    <!-- Footer note -->
    <p class="text-center text-xs text-gray-400 dark:text-gray-600 mt-6">
      Ao entrar você concorda com nossos
      <a href="#"
         class="underline underline-offset-2 hover:text-lilac-500 transition-colors
                focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
        Termos de Uso
      </a>
      e
      <a href="#"
         class="underline underline-offset-2 hover:text-lilac-500 transition-colors
                focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-lilac-500 rounded">
        Política de Privacidade
      </a>.
    </p>

  </div>
</main>

<!-- ═══════════════════════════════════════════════════════
     FOOTER
═══════════════════════════════════════════════════════ -->
<footer class="relative z-10 px-6 py-6 text-center">
  <p class="text-xs text-gray-400 dark:text-gray-600">
    © 2025 Taskify. Feito com ♥ no Brasil.
  </p>
</footer>

<script>
  /* ── Theme toggle ─────────────────────────────────────── */
  const html = document.documentElement;
  const btn  = document.getElementById('theme-toggle');
  const moon = document.getElementById('icon-moon');
  const sun  = document.getElementById('icon-sun');

  function applyTheme(dark) {
    html.classList.toggle('dark', dark);
    moon.classList.toggle('hidden', dark);
    sun.classList.toggle('hidden', !dark);
  }

  btn.addEventListener('click', () => {
    const isDark = html.classList.contains('dark');
    applyTheme(!isDark);
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  });

  const stored = localStorage.getItem('theme');
  if (stored) applyTheme(stored === 'dark');

  /* ── Toggle password visibility ───────────────────────── */
  const toggleBtn  = document.getElementById('toggle-password');
  const passInput  = document.getElementById('password');
  const eyeIcon    = document.getElementById('eye-icon');
  const eyeOffIcon = document.getElementById('eye-off-icon');

  toggleBtn.addEventListener('click', () => {
    const isPassword = passInput.type === 'password';
    passInput.type = isPassword ? 'text' : 'password';
    toggleBtn.setAttribute('aria-pressed', String(isPassword));
    toggleBtn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
    eyeIcon.classList.toggle('hidden', isPassword);
    eyeOffIcon.classList.toggle('hidden', !isPassword);
  });
</script>

</body>
</html>
